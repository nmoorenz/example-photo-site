[build]
  # Injects env vars into config.js before deploying
  command   = "pip install -r requirements.txt && python scripts/generate_config.py"
  publish   = "site"

[build.environment]
  PYTHON_VERSION = "3.12"

# Required environment variables (set in Netlify dashboard → Site settings → Environment variables):
#
#   PHOTO_SITE_PASSWORD   Your plaintext password. Netlify hashes it at build time.
#   S3_MANIFEST_URL       Full URL to manifest.json, e.g.:
#                         https://cdn.example.com/manifest.json
#
# These are never exposed in your source code or the deployed site.

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively, HTML never
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
