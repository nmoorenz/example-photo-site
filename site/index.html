<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="config.js"></script>
</head>
<body>
  <!-- Password gate -->
  <div id="gate" class="gate">
    <div class="gate-inner">
      <p class="gate-label">enter password</p>
      <input type="password" id="gate-input" class="gate-input" autocomplete="current-password" placeholder="·  ·  ·  ·  ·  ·" />
      <p id="gate-error" class="gate-error"></p>
    </div>
  </div>

  <!-- Main site (hidden until authenticated) -->
  <div id="app" class="app hidden">
    <header class="site-header">
      <h1 class="site-title">Photos</h1>
    </header>

    <main>
      <div id="loading" class="loading">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
      <div id="error-msg" class="error-msg hidden"></div>
      <div id="albums-grid" class="albums-grid"></div>
    </main>
  </div>

  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
